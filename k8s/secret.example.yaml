# Template only — do NOT commit real secrets.
# In CD: kubectl apply -f secret.yaml (generated) or use External Secrets / Sealed Secrets / EKS + SSM.
#
# Create from env file (local smoke test on cluster):
#   kubectl create secret generic backend-devops-interview-env \
#     --from-env-file=.env.production --dry-run=client -o yaml > secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: backend-devops-interview-env
  labels:
    app: backend-devops-interview
type: Opaque
stringData:
  ENVIRONMENT: production
  DEBUG: "False"
  SECRET_KEY: REPLACE_ME_STRONG_SECRET
  ALLOWED_HOSTS: api.example.com
  DB_ENGINE: django.db.backends.postgresql
  DB_NAME: backend_devops_interview
  DB_USER: REPLACE_ME
  DB_PASSWORD: REPLACE_ME
  DB_HOST: REPLACE_ME_RDS_ENDPOINT
  DB_PORT: "5432"
  CONN_MAX_AGE: "60"
  LOG_LEVEL: INFO
